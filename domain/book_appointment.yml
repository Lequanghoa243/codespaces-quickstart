version: "3.1"

actions:
  - action_ask_category
  - action_ask_service


slots:
  name:
    type: text
    mappings:
      - type: from_llm

  phone:
    type: text
    mappings:
      - type: from_llm

  category:
    type: text
    mappings:
      - type: from_llm

  service:
    type: text
    mappings:
      - type: from_llm

  staff:
    type: text
    mappings:
      - type: from_llm
  time:
    type: text
    mappings:
      - type: from_llm


responses:
  utter_ask_name:
    - text: "May I know your name?"

  utter_ask_phone:
    - text: "What is your phone number?"

  utter_ask_staff:
    - text: "Do you have a preferred staff member?"

  utter_ask_time:
    - text: "When would you like to come in?"

  utter_booking_complete:
    - text: "Thank you {name}! Your {service} with {staff} at {time} is confirmed. We’ve noted your phone number as {phone}."