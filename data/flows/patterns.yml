flows:
  pattern_completed:
    description: Completion of a user's flow
    steps:
    - noop: true
      next: END

  pattern_chitchat:
    description: Conversation repair flow for off-topic interactions that won't disrupt the main conversation use for handling knowledge-based questions. should not respond to anything else for which there is a flow defined
    name: pattern chitchat
    steps:
      - action: utter_free_chitchat_response

  pattern_search:
    description: Flow for handling knowledge-based store-related questions
    name: pattern search
    steps:
      - action: utter_free_chitchat_response

  pattern_session_start:
    description: Flow for starting the conversation
    name: pattern session start
    steps:
      - action: action_session_start